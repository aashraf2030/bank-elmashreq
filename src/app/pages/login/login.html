<main class="grow flex flex-col md:flex-row pt-margin-desktop min-h-[85vh]">
    <!-- Left Side: Informative/Branding Card -->
    <div class="hidden md:flex md:w-1/2 relative bg-primary items-center justify-center overflow-hidden">
        <div class="absolute inset-0 w-full h-full">
            <img class="w-full h-full object-cover opacity-80 mix-blend-overlay" alt="لوحة الإدارة بنك المشرق"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfw1Rp_uWAs2nVffTfOARMAz-ErX3nbsjbKyXSq30Gcy5T949SwL1AE0nz5Bsx2e8-bgXItjn0jiwPy40EmfIm-FKNFxP5tnUt33seIrrORBqxnwpdn1ahxIdE2zUog9eNGv4ESrkyi6HkZw5_S2bUx0YU_aYwPUh4N4Aq6hYtDeEvv1CERjO7WMMmYU1HMwL7-WXbAWecBGuX-hmXZcfOvEygfuNMOT1GM8ch8nm8M79yO-_fMbwDxBM6Oe7RJwzGUZ1jfVI7bK8" />
        </div>
        <div class="relative z-10 text-center px-12 max-w-lg">
            <div
                class="w-24 h-24 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-8 backdrop-blur-md border border-white/20">
                <span class="material-symbols-outlined text-on-primary text-5xl"
                    style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
            </div>
            <h1 class="font-headline-lg text-headline-lg text-on-primary mb-4 leading-tight">بوابة الإدارة الآمنة</h1>
            <p class="font-body-lg text-body-lg text-primary-fixed-dim">تحكم متكامل في متابعة الطلبات وإدارة حسابات
                العملاء بشكل فوري وآمن.</p>
        </div>
        <!-- Abstract Glow Background -->
        <div
            class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-secondary-container rounded-full blur-[150px] opacity-20 transform translate-y-1/2 -translate-x-1/2">
        </div>
    </div>

    <!-- Right Side: Login Form -->
    <div
        class="w-full md:w-1/2 flex items-center justify-center p-margin-mobile md:p-12 bg-surface-container-lowest relative">
        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <h2 class="font-headline-md text-headline-md font-bold text-primary mb-2">تسجيل دخول النظام</h2>
                <p class="font-body-md text-body-md text-on-surface-variant">الرجاء إدخال بيانات حساب المسؤول للوصول إلى
                    لوحة التحكم.</p>
            </div>
            <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="space-y-6">
                <!-- Email Field -->
                <app-text-box formControlName="email" label="البريد الإلكتروني للمسؤول"
                    placeholder="admin@bankmashreq.com" type="email" icon="mail" [required]="true" [clearable]="true">
                </app-text-box>

                <!-- Password Field -->
                <app-text-box formControlName="password" label="كلمة المرور" placeholder="أدخل كلمة المرور الخاصة بك"
                    type="password" icon="lock" [required]="true">
                </app-text-box>

                <!-- Submit Button -->
                <div class="pt-4">
                    <app-button type="submit" variant="secondary" size="lg" [loading]="isLoading()" class="w-full">
                        دخول لوحة التحكم
                    </app-button>
                </div>
            </form>
        </div>
    </div>
</main>
